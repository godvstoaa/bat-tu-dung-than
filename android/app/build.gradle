plugins {
  id 'com.android.application'
}

android {
  namespace 'com.battu.dungthan'
  compileSdk 34

  defaultConfig {
    applicationId "com.battu.dungthan"
    minSdk 21
    targetSdk 34
    versionCode 3
    versionName "1.2"
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}
