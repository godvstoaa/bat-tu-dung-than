<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#241b33"/>
      <stop offset="100%" stop-color="#0a0913"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eccb"/>
      <stop offset="52%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a9801b"/>
    </linearGradient>
    <radialGradient id="seal" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#f7eccb"/>
      <stop offset="55%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9c761a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- vòng ngoài -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.55"/>
  <!-- 8 quẻ bát quái quanh vòng -->
  <g font-family="'Noto Serif SC','STSong',serif" font-weight="700" font-size="40" fill="#f3d57a" text-anchor="middle" dominant-baseline="central">
    <text x="256" y="78">乾</text>
    <text x="384" y="128">兌</text>
    <text x="434" y="256">離</text>
    <text x="384" y="384">震</text>
    <text x="256" y="434">巽</text>
    <text x="128" y="384">坎</text>
    <text x="78" y="256">艮</text>
    <text x="128" y="128">坤</text>
  </g>
  <!-- ấn 呝i -->
  <rect x="178" y="178" width="156" height="156" rx="18" fill="url(#seal)" stroke="#f7eccb" stroke-width="4"/>
  <rect x="178" y="178" width="156" height="156" rx="18" fill="none" stroke="#7d1a14" stroke-width="1" opacity="0.4" transform="translate(0,3)"/>
  <text x="256" y="262" font-family="'Ma Shan Zheng','STSong',serif" font-size="128" fill="#7d1a14" text-anchor="middle" dominant-baseline="central" font-weight="700">命</text>
