# Auto-deploy battu.god8.shop (Cloudflare Worker — serve static + AI proxy /zai /deepseek...)
# [loop 89] dùng Global API Key auth (CLOUDFLARE_EMAIL + CLOUDFLARE_API_KEY).
#   CHỈ deploy khi cả 2 secret đã set → KHÔNG fail-spam email (vòng 63 cũ fail mọi push).
#   Build base='/' (Worker serve root, KHÔNG dùng GH_PAGES base).
name: Deploy to Cloudflare (battu.god8.shop)
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build   # base='/' cho Worker (KHÔNG set GH_PAGES)
      - name: Check Cloudflare creds
        run: echo "CF_KEY_SET=${{ secrets.CLOUDFLARE_API_KEY != '' }}" >> $GITHUB_ENV
      - name: Deploy Worker (battu.god8.shop)
        if: env.CF_KEY_SET == 'true'
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: Skip (chưa set creds)
        if: env.CF_KEY_SET != 'true'
        run: echo "⚠ CLOUDFLARE_API_KEY/CLOUDFLARE_EMAIL secret chưa set → bỏ qua (GitHub Pages vẫn deploy). Thêm secret để battu.god8.shop auto-update."
