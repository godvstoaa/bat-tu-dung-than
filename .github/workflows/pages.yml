# Auto-deploy lên GitHub Pages mỗi push → https://godvstoaa.github.io/bat-tu-dung-than/
# Dùng gh-pages package (push lên branch gh-pages) thay vì actions/deploy-pages
# (tránh environment protection rules).
name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: GH_PAGES=1 npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx gh-pages -d dist --message "Auto-deploy ${GITHUB_SHA::7}" --add
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
